<html>
<head>
<title>Q4</title>
<script>
function add(){
  var x = document.getElementById("t").value;
  x = parseInt(x) + 1;
  document.getElementById("t").value = x;
}

function sub(){
  var x = document.getElementById("t").value;
  x = parseInt(x) - 1;
  document.getElementById("t").value = x;
}
</script>
</head>

<body>

<input type="text" id="t" value="0"><br><br>
<input type="button" value="+" onclick="add()">
<input type="button" value="-" onclick="sub()">

</body>
</html>
