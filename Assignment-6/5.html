<html>
<head>
<title>Prime Number</title>

<script>
function check(){
  var n = document.getElementById("t").value;
  var i, f=0;

  for(i=2;i<n;i++){
    if(n%i==0){
      f=1;
      break;
    }
  }

  if(f==0)
    alert("Prime Number");
  else
    alert("Not a Prime Number");
}
</script>

</head>

<body>

Enter Number: <input type="text" id="t">

<input type="button" value="Check" onclick="check()">

</body>
</html>
