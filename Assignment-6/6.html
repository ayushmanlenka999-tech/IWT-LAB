<html>
<head>
    <title>Q6</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); height:300px; width: 300px; }
        h2 { margin-top: 0; font-size: 1.2rem; }
        label { display: block; margin: 10px 0 5px; font-size: 0.9rem; color: #555; }
        select, input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: black; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .error { color: red; font-size: 0.8rem; margin-top: 10px; display: none; }
        #output { background: #f9f9f9; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Currency Converter</h2>
    <label>From:</label>
    <select id="fromCurrency">
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="GBP">GBP</option>
        <option value="INR">INR</option>
        <option value="AUD">AUD</option>
    </select>

    <input type="number" id="amount" placeholder="Enter amount" value="1000">
    <label>To:</label>
    <select id="toCurrency">
        <option value="INR" selected>INR</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="GBP">GBP</option>
        <option value="AUD">AUD</option>
    </select>

    <input type="text" id="output" readonly placeholder="Converted amount">
    
    <button onclick="convertCurrency()">Convert</button>
    <div id="errorMessage" class="error"></div>
</div>

<script>
    const conversionRates = {
        USD: { EUR: 0.93, GBP: 0.82, INR: 82.74, AUD: 1.47 },
        EUR: { USD: 1.08, GBP: 0.88, INR: 89.06, AUD: 1.58 },
        GBP: { USD: 1.22, EUR: 1.14, INR: 101.5, AUD: 1.80 },
        INR: { USD: 0.012, EUR: 0.011, GBP: 0.0098, AUD: 0.018 },
        AUD: { USD: 0.68, EUR: 0.63, GBP: 0.55, INR: 55.87 }
    };
    function convertCurrency() {
        const from = document.getElementById('fromCurrency').value;
        const to = document.getElementById('toCurrency').value;
        const amount = document.getElementById('amount').value;
        const output = document.getElementById('output');
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.style.display = 'none';
        output.value = '';
        if (!amount || amount <= 0) {
            errorDiv.innerText = "Please enter a valid amount.";
            errorDiv.style.display = 'block';
            return;
        }
        if (from === to) {
            errorDiv.innerText = "Source and target currencies cannot be the same.";
            errorDiv.style.display = 'block';
            return;
        }
        const rate = conversionRates[from][to];
        const result = (amount * rate).toFixed(2);
        output.value = result;
    }
</script>

</body>
</html>
