<script>
let m=parseInt(prompt("Enter marks secured"));
if(m>=90)
document.write("Grade A");
else if(m>=75&&m<90)
document.write("Grade B");
else if(m>=50&&m<75)
document.write("Grade C");
else if(m<50)
document.write("Fail");
</script>
